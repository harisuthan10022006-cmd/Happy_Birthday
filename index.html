<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something special for Someone speical❤️</title>

<style>
body {
margin: 0;
body {
    font-family: 'Poopins' , sans-serif;
}
h1{
    font-family: 'Dancing Script', cursive;
    }
background: linear-gradient(135deg, #4facfe, #00f2fe);
color: white;
text-align: center;
overflow-x: hidden;
overflow-y: auto;
scroll-behavior: smooth;
}

/* Floating bubbles */
.bubble {
position: fixed;
bottom: -20px;
background: rgba(255,255,255,0.3);
border-radius: 50%;
animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
0% { transform: translateY(0); opacity: 0.7;}
100% { transform: translateY(-100vh); opacity: 0;}
}

.container {
padding: 60px 20px;
animation: fadeIn 1.5s ease;
}

h1 {
font-size: 3em;
animation: glow 2s ease-in-out infinite alternate;
}

/* Glow effect */
@keyframes glow {
from { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
to { text-shadow: 0 0 25px rgba(255,255,255,0.9); }
}

.typing {
font-size: 1.3em;
max-width: 650px;
margin: auto;
border-right: 2px solid white;
white-space: pre-line;
overflow: hidden;
}

/* Button animation */
button {
margin-top: 30px;
padding: 12px 28px;
border: none;
border-radius: 30px;
background: white;
color: #4facfe;
font-size: 16px;
cursor: pointer;
animation: pulse 2s infinite;
}

@keyframes pulse {
0% { transform: scale(1);}
50% { transform: scale(1.08);}
100% { transform: scale(1);}
}

.hidden {
display: none;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px);}
to { opacity: 1; transform: translateY(0);}
}

.countdown {
font-size: 1.5em;
margin-top: 25px;
font-weight: bold;
}

</style>

</head>

<body>

<div class="container" id="page1">
    <h1>Hey You 💫</h1>
    <p>I made something… just for you.</p>
    <button onclick="nextPage()">Click here ❤️</button>
</div>

<div class="container hidden" id="page2">
    <h1> Advance Happy Birthday, Jannu🎂</h1>
    <div id="message" class="typing"></div>

```
<div class="countdown" id="countdown"></div>
```

</div>

<script>

// PAGE SWITCH
function nextPage() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
    startTyping();
}

// TYPING EFFECT
const text = `I didn’t know how to say everything properly that day...

But meeting you… it changed something in me.

I was nervous, I couldn’t talk much…
but honestly, it was because you mattered more than I expected.

Even yesterday… I kept waiting for your message.

Not because I was upset…
but because I had started missing your presence already.

We may not have a lot of memories yet…

but whatever little time I spent with you,
it genuinely means a lot to me.

I just want to see you smile… always ❤️`;

let i = 0;
function startTyping() {
    const speed = 40;
    function type() {
        if (i < text.length) {
            document.getElementById("message").innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

// COUNTDOWN
const birthday = new Date("April 21, 2026 00:00:00").getTime();

setInterval(function() {
    const now = new Date().getTime();
    const distance = birthday - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
        "Countdown: " + days + "d " + hours + "h " + minutes + "m " + seconds + "s";

}, 1000);

</script>

</body>
</html>
