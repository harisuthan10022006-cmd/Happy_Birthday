<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
}

/* LOCK SCREEN */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass card */
.lock-box {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease;
}

/* Title */
.lock-box h2 {
    font-family: 'Dancing Script', cursive;
    font-size: 2em;
}

/* Input */
.lock-box input {
    width: 80%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 15px;
}

/* Button */
.lock-box button {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: white;
    color: #4facfe;
    cursor: pointer;
}

/* Error */
#errorMsg {
    margin-top: 10px;
    color: #ffe0e0;
}

/* GOLD TEXT */
.name {
    font-family: 'Playfair Display', serif;
    font-size: 2.3em;
    background: linear-gradient(120deg,#d4af37,#ffd700,#fff8dc,#ffd700,#d4af37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine {
    100% { background-position: 200%; }
}

/* Carousel */
.carousel {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    margin-top: 20px;
}

.carousel img {
    width: 200px;
    border-radius: 15px;
}

/* Viewer */
#viewer {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

#viewer img {
    max-width: 90%;
}

/* Hidden */
.hidden { display: none; }

.blur { filter: blur(5px); }

/* Fade */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<!-- LOCK SCREEN -->

<div id="lockScreen">
    <div class="lock-box">
        <h2>🔐 Just for You</h2>
        <p>Enter the password to unlock something special 💙</p>

```
    <input type="password" id="passwordInput" placeholder="Type here...">
    <br>
    <button onclick="checkPassword()">Unlock</button>

    <p id="errorMsg"></p>
</div>
```

</div>

<!-- MAIN -->

<div id="main" style="display:none;">

<div id="page1">
    <h2>To You 💙</h2>
    <button onclick="nextPage()">Open it</button>
</div>

<div id="page2" class="hidden">
    <div class="name">For Someone Special ✨</div>
    <h1>Advance Happy Birthday</h1>

```
<div id="message"></div>

<div class="carousel">
    <img src="photo1.jpeg" onclick="openImage(this)">
    <img src="photo2.jpeg" onclick="openImage(this)">
    <img src="photo3.jpeg" onclick="openImage(this)">
</div>
```

</div>

</div>

<div id="viewer" onclick="closeImage()">
    <img id="viewerImg">
</div>

<script>

/* FUNNY RESPONSES */
const funnyMessages = [
"Wrong da 😅 try again",
"Close ah vandhachu… but not correct 😏",
"Hint venuma? 😄",
"Idhu illa… think again 👀",
"Seri concentrate 😌",
"Athu illa pa 😂"
];

function checkPassword(){
    const correctPassword = "21april";

    const input = document.getElementById("passwordInput").value;

    if(input === correctPassword){
        document.getElementById("lockScreen").style.display="none";
        document.getElementById("main").style.display="block";
    } else {
        let msg = funnyMessages[Math.floor(Math.random()*funnyMessages.length)];
        document.getElementById("errorMsg").innerText = msg;
    }
}

/* PAGE SWITCH */
function nextPage(){
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
    startTyping();
}

/* TYPING */
const text="Advance Happy Birthday 💙";

let i=0;
function startTyping(){
    function type(){
        if(i<text.length){
            document.getElementById("message").innerHTML+=text.charAt(i);
            i++;
            setTimeout(type,40);
        }
    }
    type();
}

/* IMAGE VIEW */
function openImage(img){
    document.getElementById("viewer").style.display="flex";
    document.getElementById("viewerImg").src=img.src;
}

function closeImage(){
    document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
