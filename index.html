<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise for you💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
}

/* Container */
.container {
    padding: 60px 20px;
    animation: fadeIn 1.5s ease;
}

/* Heading */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,255,255,0.5);}
    to { text-shadow: 0 0 25px rgba(255,255,255,0.9);}
}

/* JANNU NAME */
#jannuName {
    font-family: 'Dancing Script', cursive;
    font-size: 3em;
    margin-bottom: 10px;
    opacity: 0;
    transform: scale(0.5);
    animation: revealName 2s ease forwards;
}

/* HEARTBEAT */
.heartbeat {
    animation: beat 1.2s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    25% { transform: scale(1.15); }
    50% { transform: scale(1); }
    75% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

/* REVEAL */
@keyframes revealName {
    0% {
        opacity: 0;
        transform: scale(0.3) translateY(20px);
    }
    50% {
        opacity: 1;
        transform: scale(1.2);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

/* Letter */
.letter {
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    backdrop-filter: blur(10px);
}

.letter h2 {
    font-family: 'Dancing Script', cursive;
}

.letter-text {
    white-space: pre-line;
    line-height: 1.8;
}

/* Typing */
.typing {
    border-right: 2px solid white;
    white-space: pre-line;
    max-width: 400px;
    margin: auto;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #4facfe;
    cursor: pointer;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1);}
    50% { transform: scale(1.08);}
    100% { transform: scale(1);}
}

.hidden { display: none; }

.countdown {
    margin-top: 20px;
    font-weight: bold;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    opacity: 0.9;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: translate(0,0) rotate(0deg); opacity: 1;}
    100% { transform: translate(var(--x), var(--y)) rotate(720deg); opacity: 0;}
}

/* Floating particles */
.particle {
    position: fixed;
    bottom: -10px;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(0);}
    to { transform: translateY(-120vh);}
}
</style>

</head>

<body>

<audio id="bgMusic" src="song.mp3"></audio>

<script>
setInterval(() => {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 10000);
}, 300);

function burstConfetti() {
    for (let i = 0; i < 120; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.background = `hsl(${Math.random()*360},100%,60%)`;
        c.style.left = "50%";
        c.style.top = "50%";

        const x = (Math.random() - 0.5) * 600 + "px";
        const y = (Math.random() - 0.5) * 600 + "px";

        c.style.setProperty('--x', x);
        c.style.setProperty('--y', y);

        document.body.appendChild(c);
        setTimeout(() => c.remove(), 1000);
    }
}
</script>

<!-- PAGE 1 -->

<div class="container" id="page1">
    <div class="letter">
        <h2>To You 💙</h2>
        <p class="letter-text">
Eppudi ma irruka…? 😌💙  

Daily ketkura kelvi dhaan…😅

Appuram ithu etho ennala mudinja oru chinna surprise 🎁✨

Open panni paaru… konjam pidikum nu nenaikuren 👀💙 </p> <button onclick="nextPage()">Open it</button> </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">

<div id="jannuName">Jannu 💙</div>

<h1>Advance Happy Birthday</h1>

<div id="message" class="typing"></div>

<div class="countdown" id="countdown"></div>

</div>

<script>
function nextPage(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";

    burstConfetti();
    document.getElementById("bgMusic").play();

    startHeartbeat();
    startTyping();
}

function startHeartbeat(){
    let name = document.getElementById("jannuName");

    setTimeout(()=>{
        name.classList.add("heartbeat");
    },500);
}

const text=`Enna panni vachu irrukanu thane nenaikura 😅
Onnum illa…

Eppovum insta la text panni wish pannidurom…
but intha year konjam edhavathu different ah pannaumnu thonuchu 😌

Athan oru small webpage ready pannidalam nu oru idea vanthuchu…
atha appudiye execute panniyachu ✨

And nowww… advance happy birthday ma 💙

Unaku intha year romba nalla poganum… 😌
Nee nenachadhu ellame nadakanum…

Eppovum sirichute irrukanum, cause nee siricha alagha irrupa…😊✨

And ithe maari enna motivate pannite irrukanum...😅💙

Inuum neraiya sollite poghalam but birthday ku wish panna konjam content venumla,
athanala ippothaiku avalothan😁

Once again Advance Happy Birthday Jannu 💙`;

let i=0;
function startTyping(){
 let speed=40;
 function type(){
  if(i<text.length){
   document.getElementById("message").innerHTML+=text.charAt(i);
   i++;
   setTimeout(type,speed);
  }
 }
 type();
}

const birthday=new Date("April 21, 2026 00:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=birthday-now;

 let days=Math.floor(d/(1000*60*60*24));
 let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let m=Math.floor((d%(1000*60*60))/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);

 document.getElementById("countdown").innerHTML=
 "⏳ "+days+"d "+h+"h "+m+"m "+s+"s left";
},1000);
</script>

</body>
</html>
