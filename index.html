<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise for you💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
}

/* Jannu Name */
#jannuName {
    font-family: 'Dancing Script', cursive;
    font-size: 3em;
    margin-bottom: 10px;
    opacity: 0;
    transform: scale(0.5);
    animation: revealName 2s ease forwards;
}

/* Heartbeat */
.heartbeat {
    animation: beat 1.2s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    25% { transform: scale(1.15); }
    50% { transform: scale(1); }
    75% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

@keyframes revealName {
    0% {
        opacity: 0;
        transform: scale(0.3) translateY(20px);
    }
    50% {
        opacity: 1;
        transform: scale(1.2);
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}

/* KEEP YOUR EXISTING STYLES BELOW (UNCHANGED) */
.container { padding: 60px 20px; }

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3em;
}

.hidden { display: none; }

.content-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-top: 40px;
}

.center { max-width: 400px; }

.side {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.side img {
    width: 150px;
    border-radius: 15px;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    100% {
        transform: translate(var(--x), var(--y)) rotate(720deg);
        opacity: 0;
    }
}
</style>

</head>

<body>

<audio id="bgMusic" src="song.mp3"></audio>

<script>
function burstConfetti() {
    for (let i = 0; i < 120; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.background = `hsl(${Math.random()*360},100%,60%)`;
        c.style.left = "50%";
        c.style.top = "50%";

        const x = (Math.random() - 0.5) * 600 + "px";
        const y = (Math.random() - 0.5) * 600 + "px";

        c.style.setProperty('--x', x);
        c.style.setProperty('--y', y);

        document.body.appendChild(c);
        setTimeout(() => c.remove(), 1000);
    }
}
</script>

<!-- PAGE 1 -->

<div class="container" id="page1">
    <div class="letter">
        <h2>To You 💙</h2>
        <p class="letter-text">
I didn’t plan this…

But after meeting you, something stayed with me.

I couldn’t talk much that day…
but it actually meant a lot.

So I made something small for you. </p> <button onclick="nextPage()">Open it</button> </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">

<!-- ONLY JANNU -->
<div id="jannuName">Jannu 💙</div>

<h1>Advance Happy Birthday</h1>

<div class="content-wrapper">

    <div class="side">
        <img src="photo1.jpeg">
    </div>

    <div class="center">
        <div id="message" class="typing"></div>
    </div>

    <div class="side">
        <img src="photo2.jpeg">
        <img src="photo3.jpeg">
    </div>

</div>

<div class="countdown" id="countdown"></div>
```

</div>

<script>
function nextPage(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";

    burstConfetti();
    document.getElementById("bgMusic").play();

    startHeartbeat(); // 💓
    startTyping();
}

/* HEARTBEAT */
function startHeartbeat(){
    let name = document.getElementById("jannuName");

    setTimeout(()=>{
        name.classList.add("heartbeat");
    },500);
}

/* Typing */
const text=`I know it’s a little early…

but I didn’t want to be just another wish.

I just wanted to be someone who thought of you first.

Meeting you felt simple…
but it stayed with me.

And somehow…
you became someone I care about.

I’m really glad it started with you.

Advance Happy Birthday 💙`;

let i=0;
function startTyping(){
 let speed=40;
 function type(){
  if(i<text.length){
   document.getElementById("message").innerHTML+=text.charAt(i);
   i++;
   setTimeout(type,speed);
  }
 }
 type();
}

const birthday=new Date("April 21, 2026 00:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=birthday-now;

 let days=Math.floor(d/(1000*60*60*24));
 let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let m=Math.floor((d%(1000*60*60))/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);

 document.getElementById("countdown").innerHTML=
 "⏳ "+days+"d "+h+"h "+m+"m "+s+"s left";
},1000);
</script>

</body>
</html>
