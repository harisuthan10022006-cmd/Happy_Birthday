<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💙</title>

<!-- Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
}

/* Container */
.container {
    padding: 60px 20px;
    animation: fadeIn 1.5s ease;
}

/* Heading */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,255,255,0.5);}
    to { text-shadow: 0 0 25px rgba(255,255,255,0.9);}
}

/* GOLD GLITTER TEXT */
.name {
    font-family: 'Playfair Display', serif;
    font-size: 2.3em;

    background: linear-gradient(
        120deg,
        #d4af37,
        #ffd700,
        #fff8dc,
        #ffd700,
        #d4af37
    );
    background-size: 200% auto;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: shine 3s linear infinite, fadeInName 2s ease forwards;
    opacity: 0;
    margin-bottom: 10px;

    text-shadow: 0 0 10px rgba(255,215,0,0.5),
                 0 0 20px rgba(255,215,0,0.4);
}

@keyframes shine {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

@keyframes fadeInName {
    to { opacity: 1; }
}

/* Letter */
.letter {
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    backdrop-filter: blur(10px);
}

.letter h2 {
    font-family: 'Dancing Script', cursive;
}

.letter-text {
    white-space: pre-line;
    line-height: 1.8;
}

/* Typing */
.typing {
    border-right: 2px solid white;
    white-space: pre-line;
    max-width: 400px;
    margin: auto;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #4facfe;
    cursor: pointer;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1);}
    50% { transform: scale(1.08);}
    100% { transform: scale(1);}
}

.hidden { display: none; }

.countdown {
    margin-top: 20px;
    font-weight: bold;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    opacity: 0.9;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: translate(0,0) rotate(0deg); opacity: 1;}
    100% { transform: translate(var(--x), var(--y)) rotate(720deg); opacity: 0;}
}

/* Floating particles */
.particle {
    position: fixed;
    bottom: -10px;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(0);}
    to { transform: translateY(-120vh);}
}

/* Layout */
.content-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-top: 40px;
}

.center {
    max-width: 400px;
}

.side {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.side img {
    width: 150px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.4s;
    animation: fadeIn 2s ease;
}

.side img:hover {
    transform: scale(1.1);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<audio id="bgMusic" src="song.mp3"></audio>

<script>
setInterval(() => {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 10000);
}, 300);

function burstConfetti() {
    for (let i = 0; i < 120; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.background = `hsl(${Math.random()*360},100%,60%)`;
        c.style.left = "50%";
        c.style.top = "50%";

        const x = (Math.random() - 0.5) * 600 + "px";
        const y = (Math.random() - 0.5) * 600 + "px";

        c.style.setProperty('--x', x);
        c.style.setProperty('--y', y);

        document.body.appendChild(c);
        setTimeout(() => c.remove(), 1000);
    }
}
</script>

<!-- PAGE 1 -->

<div class="container" id="page1">
    <div class="letter">
        <h2>To You 💙</h2>
        <p class="letter-text">
I didn’t plan this…

But after meeting you, something stayed with me.

I couldn’t talk much that day…
but it actually meant a lot.

So I made something small for you. </p> <button onclick="nextPage()">Open it</button> </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">

```
<div class="name">For Someone Special ✨</div>

<h1>Advance Happy Birthday</h1>

<div class="content-wrapper">

    <div class="side">
        <img src="photo1.jpeg">
    </div>

    <div class="center">
        <div id="message" class="typing"></div>
    </div>

    <div class="side">
        <img src="photo2.jpeg">
        <img src="photo3.jpeg">
    </div>

</div>

<div class="countdown" id="countdown"></div>
```

</div>

<script>
function nextPage(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";

    burstConfetti();
    document.getElementById("bgMusic").play();
    startTyping();
}

const text=`I know it’s a little early…

but I didn’t want to be just another wish.

I just wanted to be someone who thought of you first.

Meeting you felt simple…
but it stayed with me.

And somehow…
you became someone I care about.

I’m really glad it started with you.

Advance Happy Birthday 💙`;

let i=0;
function startTyping(){
 let speed=40;
 function type(){
  if(i<text.length){
   document.getElementById("message").innerHTML+=text.charAt(i);
   i++;
   setTimeout(type,speed);
  }
 }
 type();
}

const birthday=new Date("April 21, 2026 00:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=birthday-now;

 let days=Math.floor(d/(1000*60*60*24));
 let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let m=Math.floor((d%(1000*60*60))/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);

 document.getElementById("countdown").innerHTML=
 "⏳ "+days+"d "+h+"h "+m+"m "+s+"s left";
},1000);
</script>

</body>
</html>
