<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
}

/* Bubbles */
.bubble {
    position: fixed;
    bottom: -20px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 0.7;}
    to { transform: translateY(-100vh); opacity: 0;}
}

/* Balloons */
.balloon {
    position: fixed;
    bottom: -50px;
    animation: rise 6s linear infinite;
}

@keyframes rise {
    from { transform: translateY(0);}
    to { transform: translateY(-120vh);}
}

/* Poppers */
.popper {
    position: fixed;
    animation: fadeOut 3s ease;
}

@keyframes fadeOut {
    from { opacity: 1;}
    to { opacity: 0;}
}

/* Container */
.container {
    padding: 60px 20px;
    animation: fadeIn 1.5s ease;
}

/* Glow heading */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,255,255,0.5);}
    to { text-shadow: 0 0 25px rgba(255,255,255,0.9);}
}

/* Letter */
.letter {
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    backdrop-filter: blur(10px);
}

.letter h2 {
    font-family: 'Dancing Script', cursive;
}

.letter-text {
    white-space: pre-line;
    line-height: 1.8;
}

/* Typing */
.typing {
    border-right: 2px solid white;
    white-space: pre-line;
    max-width: 650px;
    margin: auto;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #4facfe;
    cursor: pointer;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1);}
    50% { transform: scale(1.08);}
    100% { transform: scale(1);}
}

.hidden { display: none; }

.countdown {
    margin-top: 20px;
    font-weight: bold;
}

/* Ribbons */
.ribbon {
    position: absolute;
    top: 0;
    width: 6px;
    height: 80px;
    background: white;
}

/* Gallery */
.gallery img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 15px;
    margin: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}
</style>

</head>

<body>

<!-- Animations -->

<script>
setInterval(()=>{
 let b=document.createElement("div");
 b.className="bubble";
 let s=Math.random()*20+10;
 b.style.width=s+"px";
 b.style.height=s+"px";
 b.style.left=Math.random()*100+"vw";
 document.body.appendChild(b);
 setTimeout(()=>b.remove(),8000);
},500);

setInterval(()=>{
 let b=document.createElement("div");
 b.className="balloon";
 b.innerHTML="🎈";
 b.style.left=Math.random()*100+"vw";
 document.body.appendChild(b);
 setTimeout(()=>b.remove(),6000);
},800);

setInterval(()=>{
 let p=document.createElement("div");
 p.className="popper";
 p.innerHTML="🎊";
 p.style.left=Math.random()*100+"vw";
 p.style.top=Math.random()*50+"vh";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),3000);
},1500);
</script>

<!-- PAGE 1 -->

<div class="container" id="page1">
    <div class="letter">
        <h2>To You 💙</h2>
        <p class="letter-text">
I didn’t plan this…

But after meeting you, something stayed with me.

I couldn’t talk much that day…
but it actually meant a lot.

So I made something small for you. </p> <button onclick="nextPage()">Open it 💫</button> </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">
    <div style="position:relative;">
        <div class="ribbon" style="left:40%"></div>
        <div class="ribbon" style="left:60%"></div>
        <h1>🎉 Advance Happy Birthday 🎂🎈</h1>
    </div>

```
<div id="message" class="typing"></div>

<div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<div class="countdown" id="countdown"></div>
```

</div>

<script>
function nextPage(){
 document.getElementById("page1").style.display="none";
 document.getElementById("page2").style.display="block";
 startTyping();
}

const text=`I know it’s a little early…

but I didn’t want to be just another wish.

I just wanted to be someone who thought of you first.

Meeting you felt simple…
but it stayed with me.

And somehow…
you became someone I care about.

I’m really glad it started with you.

Advance Happy Birthday 💙`;

let i=0;
function startTyping(){
 let speed=40;
 function type(){
  if(i<text.length){
   document.getElementById("message").innerHTML+=text.charAt(i);
   i++;
   setTimeout(type,speed);
  }
 }
 type();
}

const birthday=new Date("April 21, 2026 00:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=birthday-now;
 let days=Math.floor(d/(1000*60*60*24));
 let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let m=Math.floor((d%(1000*60*60))/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);

 document.getElementById("countdown").innerHTML=
 "⏳ "+days+"d "+h+"h "+m+"m "+s+"s left";
},1000);
</script>

</body>
</html>
