<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise for you💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
}

/* Container */
.container {
    padding: 60px 20px;
}

/* GOLD TEXT */
.name {
    font-family: 'Playfair Display', serif;
    font-size: 2.3em;
    background: linear-gradient(120deg,#d4af37,#ffd700,#fff8dc,#ffd700,#d4af37);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine {
    100% { background-position: 200%; }
}

/* Jannu reveal */
#jannuName {
    font-family: 'Dancing Script', cursive;
    font-size: 3em;
    opacity: 0;
    transform: scale(0.5);
    animation: revealName 2s ease forwards;
}

/* Heartbeat effect */
.heartbeat {
    animation: beat 1.2s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    25% { transform: scale(1.15); }
    50% { transform: scale(1); }
    75% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

/* Name animation */
@keyframes revealName {
    0% {
        opacity: 0;
        transform: scale(0.3) translateY(20px);
    }
    50% {
        opacity: 1;
        transform: scale(1.2);
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}

/* Layout */
.content-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-top: 40px;
}

.center {
    max-width: 400px;
}

.side {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.side img {
    width: 150px;
    border-radius: 15px;
}

/* Button */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: white;
    color: #4facfe;
}

/* Typing */
.typing {
    max-width: 400px;
    margin: auto;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    100% {
        transform: translate(var(--x), var(--y)) rotate(720deg);
        opacity: 0;
    }
}

/* Hidden */
.hidden {
    display: none;
}
</style>

</head>

<body>

<audio id="bgMusic" src="song.mp3"></audio>

<script>
function burstConfetti(){
    for(let i=0;i<100;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.background=`hsl(${Math.random()*360},100%,60%)`;
        c.style.left="50%";
        c.style.top="50%";
        c.style.setProperty('--x',(Math.random()-0.5)*500+'px');
        c.style.setProperty('--y',(Math.random()-0.5)*500+'px');
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),1000);
    }
}
</script>

<!-- PAGE 1 -->

<div class="container" id="page1">
    <h2>To You 💙</h2>
    <button onclick="nextPage()">Open it</button>
</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">

```
<!-- NAME REVEAL -->
<div id="nameReveal">
    <div id="jannuName">Jannu 💙</div>
    <div class="name hidden" id="finalName">For Someone Special ✨</div>
</div>

<h1>Advance Happy Birthday</h1>

<div class="content-wrapper">
    <div class="side">
        <img src="photo1.jpeg">
    </div>

    <div class="center">
        <div id="message" class="typing"></div>
    </div>

    <div class="side">
        <img src="photo2.jpeg">
        <img src="photo3.jpeg">
    </div>
</div>
```

</div>

<script>
function nextPage(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";

    burstConfetti();
    document.getElementById("bgMusic").play();

    showNameReveal();
    startTyping();
}

/* NAME REVEAL + HEARTBEAT */
function showNameReveal(){
    let name = document.getElementById("jannuName");

    setTimeout(() => {
        name.classList.add("heartbeat");
    }, 500);

    setTimeout(() => {
        name.style.display = "none";
        document.getElementById("finalName").classList.remove("hidden");
    }, 3000);
}

/* Typing */
const text=`I know it’s a little early…

but I didn’t want to be just another wish.

I just wanted to be someone who thought of you first.

Meeting you felt simple…
but it stayed with me.

And somehow…
you became someone I care about.

I’m really glad it started with you.

Advance Happy Birthday 💙`;

let i=0;
function startTyping(){
    function type(){
        if(i<text.length){
            document.getElementById("message").innerHTML+=text.charAt(i);
            i++;
            setTimeout(type,40);
        }
    }
    type();
}
</script>

</body>
</html>
